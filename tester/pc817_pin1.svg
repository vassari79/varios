<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 260">

<!-- Background -->
<rect width="500" height="260" fill="#F8F6F2" rx="10"/>
<text font-family="sans-serif" font-size="13" font-weight="bold" x="250" y="28" text-anchor="middle" fill="#3d3d3a">¿Cómo identificar el Pin 1 del PC817?</text>

<!-- ===== CHIP 1 — con punto ===== -->
<text font-family="sans-serif" font-size="11" x="125" y="55" text-anchor="middle" fill="#5F5E5A">Vista desde arriba</text>

<!-- Chip body -->
<rect x="75" y="65" width="100" height="120" rx="6" fill="#2C2C2A" stroke="#1a1a18" stroke-width="1.5"/>

<!-- Muesca (notch) -->
<path d="M115 65 Q125 52 135 65" fill="#F8F6F2" stroke="#1a1a18" stroke-width="1"/>

<!-- Punto pin 1 -->
<circle cx="90" cy="82" r="5" fill="#F8F6F2" opacity="0.9"/>

<!-- Pins left -->
<rect x="55" y="80" width="20" height="10" rx="2" fill="#C8A040" stroke="#9A7830" stroke-width="0.8"/>
<rect x="55" y="115" width="20" height="10" rx="2" fill="#C8A040" stroke="#9A7830" stroke-width="0.8"/>

<!-- Pins right -->
<rect x="125" y="80" width="20" height="10" rx="2" fill="#C8A040" stroke="#9A7830" stroke-width="0.8"/>
<rect x="125" y="115" width="20" height="10" rx="2" fill="#C8A040" stroke="#9A7830" stroke-width="0.8"/>

<!-- Pin labels -->
<text font-family="sans-serif" font-size="12" font-weight="bold" x="48" y="89" text-anchor="end" fill="#D85A30">1</text>
<text font-family="sans-serif" font-size="12" font-weight="bold" x="48" y="124" text-anchor="end" fill="#D85A30">2</text>
<text font-family="sans-serif" font-size="12" font-weight="bold" x="152" y="89" fill="#3B6D11">4</text>
<text font-family="sans-serif" font-size="12" font-weight="bold" x="152" y="124" fill="#3B6D11">3</text>

<!-- Arrows -->
<line x1="70" y1="76" x2="88" y2="82" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="3 2"/>
<text font-family="sans-serif" font-size="9" x="125" y="200" text-anchor="middle" fill="#888780">muesca + punto = pin 1</text>

<!-- ===== CHIP 2 — vista lateral / soldado ===== -->
<text font-family="sans-serif" font-size="11" x="375" y="55" text-anchor="middle" fill="#5F5E5A">Vista de frente (soldado)</text>

<!-- Chip body -->
<rect x="305" y="90" width="140" height="80" rx="6" fill="#2C2C2A" stroke="#1a1a18" stroke-width="1.5"/>

<!-- Muesca frontal -->
<path d="M355 90 Q375 77 395 90" fill="#F8F6F2" stroke="#1a1a18" stroke-width="1"/>

<!-- Pins bottom -->
<rect x="318" y="170" width="10" height="35" rx="2" fill="#C8A040" stroke="#9A7830" stroke-width="0.8"/>
<rect x="343" y="170" width="10" height="35" rx="2" fill="#C8A040" stroke="#9A7830" stroke-width="0.8"/>
<rect x="393" y="170" width="10" height="35" rx="2" fill="#C8A040" stroke="#9A7830" stroke-width="0.8"/>
<rect x="418" y="170" width="10" height="35" rx="2" fill="#C8A040" stroke="#9A7830" stroke-width="0.8"/>

<!-- Pin labels bottom -->
<text font-family="sans-serif" font-size="12" font-weight="bold" x="323" y="218" text-anchor="middle" fill="#D85A30">1</text>
<text font-family="sans-serif" font-size="12" font-weight="bold" x="348" y="218" text-anchor="middle" fill="#D85A30">2</text>
<text font-family="sans-serif" font-size="12" font-weight="bold" x="398" y="218" text-anchor="middle" fill="#3B6D11">3</text>
<text font-family="sans-serif" font-size="12" font-weight="bold" x="423" y="218" text-anchor="middle" fill="#3B6D11">4</text>

<!-- AC/DC labels -->
<text font-family="sans-serif" font-size="10" x="335" y="238" text-anchor="middle" fill="#D85A30">← lado AC</text>
<text font-family="sans-serif" font-size="10" x="410" y="238" text-anchor="middle" fill="#3B6D11">lado DC →</text>

<!-- Muesca arrow -->
<line x1="375" y1="78" x2="375" y2="68" stroke="#BA7517" stroke-width="1.5"/>
<text font-family="sans-serif" font-size="9" x="375" y="62" text-anchor="middle" fill="#BA7517">muesca</text>

<!-- Divider -->
<line x1="250" y1="45" x2="250" y2="245" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="4 3"/>

<!-- Bottom note -->
<rect x="60" y="230" width="380" height="22" rx="6" fill="#EAF3DE"/>
<text font-family="sans-serif" font-size="10" x="250" y="244" text-anchor="middle" fill="#27500A">⚠ La muesca siempre queda del lado del pin 1 y 2 (lado AC — red eléctrica)</text>
</svg>
